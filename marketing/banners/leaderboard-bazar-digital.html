<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ventas Garzón — Leaderboard 728×90</title>
<style>
  :root{--primary:#10b981;--primary-deep:#059669;--secondary:#f59e0b;--ink:#0f172a;--muted:#64748b;--white:#fff;--soft:#f8fafc;}
  body{margin:0;background:#0f172a;padding:40px;font-family:Arial,sans-serif;}
  .stage{display:grid;gap:24px;justify-items:center;}
  .banner{position:relative;overflow:hidden;background:var(--white);box-shadow:0 20px 60px rgba(0,0,0,.25);font-family:Arial,sans-serif;}
  .content{position:absolute;inset:0 110px 0 34px;display:flex;align-items:center;gap:18px;z-index:2;}
  .logo{font-weight:900;letter-spacing:-.04em;color:var(--ink);font-size:24px;white-space:nowrap;}
  .logo span{color:var(--primary);}
  .copy{display:grid;gap:2px;}
  .headline{font-size:24px;font-weight:900;letter-spacing:-.03em;line-height:1.05;}
  .sub{font-size:13px;color:var(--muted);font-weight:600;}
  .cta{display:inline-flex;align-items:center;justify-content:center;min-width:92px;height:38px;border-radius:999px;background:var(--primary);color:white;font-weight:900;text-decoration:none;font-size:15px;}
  .product{position:absolute;right:34px;top:14px;width:78px;height:78px;border-radius:22px;background:linear-gradient(135deg,rgba(16,185,129,.16),rgba(245,158,11,.14));display:grid;place-items:center;}
  .product svg{width:52px;height:52px;}
  .v2{background:linear-gradient(90deg,#ffffff 0%,#f1f5f9 100%);}
  .v3{background:#0f172a;color:white;}
  .v3 .logo,.v3 .sub{color:white;}
  .v3 .sub{color:#a7f3d0;}
  .v3 .cta{background:var(--primary);}
</style>
</head>
<body>
<div class="stage">
  <section class="banner" style="width:728px;height:90px;">
    <div class="content">
      <div class="logo">Ventas <span>Garzón</span></div>
      <div class="copy"><div class="headline">Lo básico, pedido y listo</div><div class="sub">Catálogo local para hogares y negocios</div></div>
    </div>
    <a class="cta" href="#">Comprar</a>
    <div class="product"><svg viewBox="0 0 64 64"><rect x="14" y="16" width="36" height="36" rx="10" fill="#10b981"/><rect x="14" y="16" width="36" height="12" rx="6" fill="#059669"/><path d="M24 34h16M24 43h12" stroke="#fff" stroke-width="4" stroke-linecap="round"/></svg></div>
  </section>

  <section class="banner v2" style="width:728px;height:90px;">
    <div class="content">
      <div class="logo">Ventas <span>Garzón</span></div>
      <div class="copy"><div class="headline">Compra sin perder tiempo</div><div class="sub">Reserva online, recoge en tienda</div></div>
    </div>
    <a class="cta" href="#">Ver catálogo</a>
    <div class="product"><svg viewBox="0 0 64 64"><path d="M20 12h24l-3 42H23z" fill="#f59e0b"/><path d="M20 12h24v14H20z" fill="#d97706"/><path d="M28 34h8M28 43h8" stroke="#fff" stroke-width="4" stroke-linecap="round"/></svg></div>
  </section>

  <section class="banner v3" style="width:728px;height:90px;">
    <div class="content">
      <div class="logo">Ventas <span>Garzón</span></div>
      <div class="copy"><div class="headline">Aseo, alimentos y bebidas</div><div class="sub">Tu pedido local, claro y confiable</div></div>
    </div>
    <a class="cta" href="#">Pedir</a>
    <div class="product"><svg viewBox="0 0 64 64"><rect x="16" y="10" width="32" height="44" rx="12" fill="#10b981"/><circle cx="32" cy="32" r="12" fill="#fff" opacity=".9"/><path d="M20 50h24" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/></svg></div>
  </section>
</div>
</body>
</html>
